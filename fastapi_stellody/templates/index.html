<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <meta name="description" content="{{ title }} — coming soon." />
    <link rel="icon" href="/static/favicon.ico" />
    <style>
      :root {
        --field-nearest: #4f9e2c;
        --card: rgba(255, 255, 255, 0.82);
        --ink: #24421f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
      }

      body {
        min-height: 100vh;
        font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      .scene {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
      }

      .card {
        background: var(--card);
        backdrop-filter: blur(2px);
        border-radius: 20px;
        padding: 2.6rem 3rem;
        text-align: center;
        box-shadow: 0 18px 50px rgba(30, 60, 20, 0.28);
        max-width: min(90vw, 30rem);
      }

      .card h1 {
        margin: 0 0 0.4rem;
        font-size: clamp(2.4rem, 8vw, 3.6rem);
        letter-spacing: 0.02em;
        color: #1f3a1a;
      }

      .card p {
        margin: 0;
        font-size: clamp(1rem, 3.6vw, 1.25rem);
        color: #3a5730;
      }

      .card .dot {
        display: inline-block;
        width: 0.5rem;
        height: 0.5rem;
        margin: 0 0.15rem;
        border-radius: 50%;
        background: var(--field-nearest);
        animation: pulse 1.4s ease-in-out infinite;
      }

      .card .dot:nth-child(2) {
        animation-delay: 0.2s;
      }

      .card .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
          transform: translateY(0);
        }
        50% {
          opacity: 1;
          transform: translateY(-3px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .card .dot {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <svg
      class="scene"
      viewBox="0 0 1200 800"
      preserveAspectRatio="xMidYMid slice"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4aa6e8" />
          <stop offset="55%" stop-color="#9fd4f2" />
          <stop offset="100%" stop-color="#f6e7b4" />
        </linearGradient>
        <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fff3b0" stop-opacity="0.95" />
          <stop offset="100%" stop-color="#fff3b0" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="tree" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#57b042" />
          <stop offset="100%" stop-color="#2f7d32" />
        </linearGradient>
      </defs>

      <!-- Sky -->
      <rect x="0" y="0" width="1200" height="800" fill="url(#sky)" />

      <!-- Sun -->
      <circle cx="960" cy="180" r="230" fill="url(#sunGlow)" />
      <circle cx="960" cy="180" r="72" fill="#ffd94a" />

      <!-- Clouds -->
      <g fill="#ffffff" opacity="0.85">
        <ellipse cx="230" cy="150" rx="90" ry="34" />
        <ellipse cx="300" cy="135" rx="70" ry="30" />
        <ellipse cx="170" cy="135" rx="55" ry="26" />
        <ellipse cx="620" cy="240" rx="70" ry="26" opacity="0.7" />
        <ellipse cx="680" cy="228" rx="52" ry="22" opacity="0.7" />
      </g>

      <!-- Far rolling field -->
      <path
        d="M0 520 Q 300 460 600 510 T 1200 500 L1200 800 L0 800 Z"
        fill="#a7d66a"
      />
      <!-- Mid field -->
      <path
        d="M0 600 Q 350 540 720 600 T 1200 590 L1200 800 L0 800 Z"
        fill="#6cbb3c"
      />
      <!-- Nearest field -->
      <path
        d="M0 690 Q 400 640 800 700 T 1200 690 L1200 800 L0 800 Z"
        fill="#4f9e2c"
      />

      <!-- Trees -->
      <g>
        <!-- left tree -->
        <rect x="182" y="500" width="20" height="70" rx="6" fill="#7a4a25" />
        <circle cx="192" cy="480" r="52" fill="url(#tree)" />
        <circle cx="160" cy="500" r="34" fill="url(#tree)" />
        <circle cx="224" cy="500" r="34" fill="url(#tree)" />

        <!-- centre-right tree -->
        <rect x="905" y="560" width="26" height="90" rx="7" fill="#7a4a25" />
        <circle cx="918" cy="536" r="66" fill="url(#tree)" />
        <circle cx="876" cy="560" r="42" fill="url(#tree)" />
        <circle cx="962" cy="560" r="42" fill="url(#tree)" />

        <!-- small distant tree -->
        <rect x="520" y="486" width="12" height="44" rx="4" fill="#7a4a25" />
        <circle cx="526" cy="474" r="32" fill="url(#tree)" />
      </g>
    </svg>

    <main class="card">
      <h1>{{ title }}</h1>
      <p>
        Our new website is on its way<span class="dot"></span
        ><span class="dot"></span><span class="dot"></span>
      </p>
    </main>
  </body>
</html>
